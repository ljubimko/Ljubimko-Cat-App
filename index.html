<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6b4423">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Ljubimko%22%2C%22short_name%22%3A%22Ljubimko%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f0e8%22%2C%22theme_color%22%3A%22%236b4423%22%7D">
<title>Ljubimko</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#f5f0e8;--parchment:#ede4d0;--sand:#d9c9a8;--terracotta:#c0714f;--rust:#a0522d;--bark:#6b4423;--ink:#2c1f0e;--warm:#faf7f2;--shadow:rgba(44,31,14,0.15);--green:#7fb069;--yellow:#e9c46a;--red:#e07a5f;}
body{background:var(--cream);font-family:'Lora',serif;color:var(--ink);min-height:100vh}
.app{min-height:100vh;background:radial-gradient(ellipse at 10% 20%,rgba(192,113,79,0.08),transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(122,140,94,0.07),transparent 50%),var(--cream)}
.header{background:linear-gradient(135deg,var(--bark),#3d2510);padding:1.6rem 1.5rem 1.2rem;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2rem);color:var(--cream);letter-spacing:.04em}
.header p{font-style:italic;color:var(--sand);font-size:.85rem;margin-top:.2rem}
nav{display:flex;background:var(--parchment);border-bottom:2px solid var(--sand);overflow-x:auto;scrollbar-width:none;position:sticky;top:72px;z-index:99}
nav::-webkit-scrollbar{display:none}
.nb{flex:none;padding:.65rem 1rem;font-family:'Lora',serif;font-size:.78rem;font-weight:600;color:var(--bark);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.nb:hover{background:var(--sand)}
.nb.active{color:var(--terracotta);border-bottom-color:var(--terracotta);background:var(--warm)}
.main{padding:1.4rem 1rem 5rem;max-width:900px;margin:0 auto}
.sc{background:var(--warm);border:1px solid var(--sand);border-radius:12px;padding:1.1rem;margin-bottom:1rem;box-shadow:0 1px 4px var(--shadow)}
.st{font-family:'Playfair Display',serif;font-size:.93rem;color:var(--bark);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;padding-bottom:.5rem;border-bottom:1px solid var(--parchment)}
.empty-home{text-align:center;padding:3rem 1rem}
.empty-home .big-icon{font-size:4rem;margin-bottom:1rem;display:block}
.empty-home h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--bark);margin-bottom:.5rem}
.empty-home p{color:var(--rust);font-style:italic;font-size:.88rem;margin-bottom:1.5rem;line-height:1.7}
.loc-label{font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;color:var(--rust);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.loc-label::after{content:'';flex:1;height:1px;background:var(--sand)}
.pet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.9rem;margin-bottom:1.6rem}
.pet-card{background:var(--warm);border:1px solid var(--sand);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px var(--shadow)}
.pet-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px var(--shadow)}
.cc-photo{width:100%;height:130px;background:linear-gradient(135deg,var(--parchment),var(--sand));display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
.cc-photo img{width:100%;height:100%;object-fit:cover}
.hdot{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dg{background:var(--green)}.dw{background:var(--yellow)}.da{background:var(--red)}
.cc-body{padding:.75rem .9rem}
.cc-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--bark)}
.cc-meta{font-size:.73rem;color:var(--rust);margin-top:.15rem;font-style:italic}
.cc-w{margin-top:.4rem;font-size:.73rem;background:var(--parchment);display:inline-block;padding:.1rem .4rem;border-radius:20px}
.profile{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:none;border:none;cursor:pointer;font-family:'Lora',serif;font-size:.82rem;color:var(--rust);margin-bottom:1rem;padding:.3rem 0;border-bottom:1px solid transparent;transition:border-color .2s}
.back-btn:hover{border-bottom-color:var(--rust)}
.ph{background:linear-gradient(135deg,var(--bark),#4a2d12);border-radius:16px;padding:1.3rem;color:var(--cream);margin-bottom:1rem;display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.pfp-wrap{position:relative;flex-shrink:0}
.pfp-img{width:85px;height:85px;border-radius:10px;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:2.6rem;overflow:hidden;border:3px solid rgba(255,255,255,.2)}
.pfp-img img{width:100%;height:100%;object-fit:cover}
.pfp-label{position:absolute;bottom:-6px;right:-6px;background:var(--terracotta);color:white;border:2px solid white;border-radius:50%;width:26px;height:26px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pfp-label input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;font-size:0}
.ph-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.ph-sub{font-style:italic;color:var(--sand);font-size:.82rem;margin-top:.2rem}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.55rem}
.tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:.16rem .5rem;font-size:.69rem}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.il{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--rust)}
.iv{font-size:.83rem;color:var(--ink);margin-top:.1rem}
.editable{cursor:pointer;display:flex;align-items:flex-start;gap:.3rem}
.editable span{flex:1}
.editable::after{content:'✏️';font-size:.65rem;flex-shrink:0;margin-top:.1rem}
.lf{background:var(--parchment);border-radius:10px;padding:.9rem;margin-top:.7rem}
.lf input,.lf select,.lf textarea{width:100%;font-family:'Lora',serif;font-size:.82rem;padding:.42rem .6rem;border:1px solid var(--sand);border-radius:8px;background:var(--warm);color:var(--ink);margin-bottom:.42rem;outline:none;transition:border-color .2s}
.lf input:focus,.lf select:focus,.lf textarea:focus{border-color:var(--terracotta)}
.lf textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.btn{font-family:'Lora',serif;font-size:.82rem;font-weight:600;padding:.42rem 1rem;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.bp{background:var(--terracotta);color:white}.bp:hover{background:var(--rust)}
.bs{background:var(--sand);color:var(--bark)}.bs:hover{background:var(--parchment)}
.bd{background:none;border:1px solid var(--red);color:var(--red);font-size:.7rem;padding:.18rem .45rem;border-radius:6px;cursor:pointer}.bd:hover{background:#fff0ee}
.be{background:none;border:1px solid var(--sand);color:var(--bark);font-size:.7rem;padding:.18rem .45rem;border-radius:6px;cursor:pointer}.be:hover{background:var(--parchment)}
.le{padding:.52rem .72rem;border-left:3px solid var(--sand);margin-bottom:.52rem;background:var(--parchment);border-radius:0 8px 8px 0;font-size:.8rem}
.le:last-child{margin-bottom:0}
.lm{display:flex;gap:.4rem;margin-bottom:.18rem;align-items:center;flex-wrap:wrap}
.ld{font-size:.68rem;color:var(--rust);font-style:italic}
.lcb{font-size:.65rem;background:var(--sand);color:var(--bark);padding:.08rem .36rem;border-radius:10px;font-weight:600}
.lcat{font-size:.65rem;padding:.08rem .36rem;border-radius:10px;font-weight:600}
.cZdravlje{background:#fce4d6;color:#8b3a1f}.cTezina{background:#d6e8d6;color:#2d5a2d}.cPonasanje{background:#e8e0f0;color:#4a2d6b}.cVeterinar{background:#d6eaf8;color:#1a4d6b}.cLijek{background:#fef9e0;color:#7d6a00}.cTrening{background:#e0f0e8;color:#1a5c2d}.cBiljeskа{background:#f0f0f0;color:#444}
.fi{display:flex;align-items:flex-start;gap:.4rem;padding:.42rem .62rem;background:#fff8e7;border:1px solid #e9c46a;border-radius:8px;font-size:.78rem;margin-bottom:.35rem;color:#7d5a00}
.wr{display:flex;justify-content:space-between;align-items:center;padding:.28rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.wr:last-child{border-bottom:none}
.wv{font-weight:600;color:var(--bark)}
canvas{width:100%;height:80px;display:block;margin-bottom:.5rem}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:.6rem}
.gthumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--parchment);cursor:pointer}
.gthumb img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}
.gthumb:hover img{opacity:.85}
.gdel{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:.68rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gadd-label{aspect-ratio:1;border-radius:8px;border:2px dashed var(--sand);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--parchment);font-size:1.4rem;color:var(--rust);transition:background .2s;position:relative;overflow:hidden}
.gadd-label:hover{background:var(--sand)}
.gadd-label input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;font-size:0}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1rem}
.stat{background:var(--warm);border:1px solid var(--sand);border-radius:12px;padding:.9rem;text-align:center}
.sn{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--terracotta);font-weight:700}
.sl{font-size:.73rem;color:var(--rust);margin-top:.15rem;font-style:italic}
.ai{display:flex;gap:.55rem;align-items:flex-start;padding:.5rem .72rem;background:#fff8e7;border-left:3px solid var(--terracotta);border-radius:0 8px 8px 0;font-size:.78rem;margin-bottom:.42rem}
.ac{font-weight:600;color:var(--bark);min-width:88px;flex-shrink:0}
.vax-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.vax-row:last-child{border-bottom:none}
.vax-name{font-weight:600;color:var(--bark);min-width:120px}
.vax-due{font-size:.72rem;padding:.1rem .4rem;border-radius:10px;font-weight:600}
.vax-ok{background:#d6e8d6;color:#2d5a2d}.vax-soon{background:#fef9e0;color:#7d6a00}.vax-overdue{background:#fce4d6;color:#8b3a1f}
.med-row{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem .7rem;background:#f0f7ff;border-left:3px solid #5b9bd5;border-radius:0 8px 8px 0;margin-bottom:.4rem;font-size:.8rem}
.exp-row{display:flex;align-items:center;gap:.6rem;padding:.38rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.exp-row:last-child{border-bottom:none}
.exp-amt{font-weight:700;color:var(--bark);min-width:60px;text-align:right}
.exp-cat{font-size:.66rem;padding:.08rem .36rem;border-radius:10px;font-weight:600;background:var(--parchment);color:var(--bark)}
.exp-total{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--terracotta);font-weight:700;text-align:right;padding:.5rem 0}
.vet-card{background:linear-gradient(135deg,#e8f4e8,#d6ead6);border:1px solid #b8d4b8;border-radius:10px;padding:.9rem;margin-bottom:.6rem}
.vet-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--bark);font-weight:700}
.vet-info{font-size:.8rem;color:var(--ink);margin-top:.3rem;line-height:1.7}
.vet-info a{color:var(--rust);text-decoration:none}
.emergency-card{background:linear-gradient(135deg,var(--bark),#3d2510);color:var(--cream);border-radius:12px;padding:1.2rem;margin-bottom:.8rem}
.em-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.7rem;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:.4rem}
.em-row{display:flex;gap:.5rem;font-size:.78rem;margin-bottom:.3rem}
.em-label{opacity:.7;min-width:100px;flex-shrink:0}
.em-val{font-weight:600}
.mood-row{display:flex;align-items:center;gap:.6rem;padding:.38rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.mood-row:last-child{border-bottom:none}
.bday-card{background:linear-gradient(135deg,#fff8e7,#fef0cc);border:1px solid #e9c46a;border-radius:10px;padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem}
.bday-today{background:linear-gradient(135deg,#fff0e6,#ffd9c0);border-color:var(--terracotta)}
.bday-days{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--terracotta);font-weight:700;margin-left:auto;flex-shrink:0}
.fbs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.fb{padding:.2rem .62rem;border-radius:20px;border:1px solid var(--sand);background:var(--warm);font-family:'Lora',serif;font-size:.72rem;cursor:pointer;color:var(--bark);transition:all .2s}
.fb.active{background:var(--terracotta);color:white;border-color:var(--terracotta)}
.empty{text-align:center;padding:1.6rem;color:var(--rust);font-style:italic;font-size:.86rem}
.ei{font-family:'Lora',serif;font-size:.83rem;padding:.3rem .5rem;border:1px solid var(--terracotta);border-radius:6px;background:var(--warm);color:var(--ink);outline:none;width:100%}
.eta{font-family:'Lora',serif;font-size:.8rem;padding:.32rem .5rem;border:1px solid var(--terracotta);border-radius:6px;background:var(--warm);color:var(--ink);outline:none;width:100%;resize:vertical;min-height:58px}
.erow{display:flex;gap:.35rem;margin-top:.3rem}
.add-pet-form{background:var(--warm);border:1px solid var(--sand);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.add-pet-form h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--bark);margin-bottom:1rem;text-align:center}
.species-btn{display:flex;gap:.7rem;justify-content:center;margin-bottom:1.2rem}
.sp-btn{flex:1;max-width:140px;padding:.8rem;border:2px solid var(--sand);border-radius:12px;background:var(--parchment);cursor:pointer;text-align:center;font-family:'Lora',serif;font-size:.85rem;color:var(--bark);transition:all .2s}
.sp-btn:hover{border-color:var(--terracotta)}
.sp-btn.active{border-color:var(--terracotta);background:#fff5f0;color:var(--terracotta);font-weight:600}
.sp-icon{font-size:2rem;display:block;margin-bottom:.3rem}
.calc-input{font-family:'Lora',serif;font-size:.85rem;padding:.35rem .6rem;border:1px solid var(--sand);border-radius:8px;background:var(--warm);color:var(--ink);outline:none;width:90px;text-align:right;transition:border-color .2s}
.calc-input:focus{border-color:var(--terracotta)}
.hidden{display:none}
@media print{nav,.back-btn,.btn,.pfp-label,.gadd-label{display:none!important}.emergency-card{break-inside:avoid}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>🐾 Ljubimko 🐾</h1>
    <p>Zdravstveni karton za vašeg ljubimca</p>
  </header>
  <nav id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>
<script>
var KATS_MAC=["Zdravlje","Težina","Ponašanje","Veterinar","Lijek","Bilješka"];
var KATS_PSA=["Zdravlje","Težina","Ponašanje","Veterinar","Lijek","Trening","Bilješka"];
var MONTHS=["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
var DAYS=["Pon","Uto","Sri","Čet","Pet","Sub","Ned"];
var SL={good:"Dobro",watch:"Pratiti",alert:"Upozorenje"};

var state={
  pets:[],logs:[],weights:{},events:[],appetiteLogs:[],
  globalVet:{ime:"",telefon:"",adresa:"",email:""},
  tab:"ljubimci",selected:null,editingField:null,editingMedId:null,
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  logFilter:"Sve",
  showAddForm:false,showLogForm:false,showWeightForm:false,showEventForm:false,
  showAppetiteForm:false,showVaxForm:false,showMedForm:false,showParForm:false,
  showExpForm:false,showVetForm:false,showVetPetForm:false,showMoodForm:false,
  newPet:{vrsta:"macka",ime:"",spol:"Ženka",sterilizirana:false,rodjendan:"",lokacija:"",boja:"",oci:"",licnost:"",porijeklo:""}
};

function load(){
  try{state.pets=JSON.parse(localStorage.getItem("lj_pets"))||[];}catch{state.pets=[];}
  try{state.logs=JSON.parse(localStorage.getItem("lj_logs"))||[];}catch{state.logs=[];}
  try{state.weights=JSON.parse(localStorage.getItem("lj_weights"))||{};}catch{state.weights={};}
  try{state.events=JSON.parse(localStorage.getItem("lj_events"))||[];}catch{state.events=[];}
  try{state.appetiteLogs=JSON.parse(localStorage.getItem("lj_appetite"))||[];}catch{state.appetiteLogs=[];}
  try{state.globalVet=JSON.parse(localStorage.getItem("lj_vet"))||{ime:"",telefon:"",adresa:"",email:""};}catch{state.globalVet={ime:"",telefon:"",adresa:"",email:""};}
  state.pets.forEach(function(p){
    if(!p.diet)p.diet={hrana:"",tip:"",raspored:"",porcija:"",favoriti:"",izbjegavati:""};
    if(!p.cjepiva)p.cjepiva=[];if(!p.lijekovi)p.lijekovi=[];if(!p.paraziti)p.paraziti=[];
    if(!p.troskovi)p.troskovi=[];if(!p.vet)p.vet={ime:"",telefon:"",adresa:"",email:""};
    if(!p.raspolozenje)p.raspolozenje=[];if(!p.photos)p.photos=[];
    if(!p.medical)p.medical=[];if(!p.zastave)p.zastave=[];
    if(!p.profilePhoto)p.profilePhoto="";if(!p.odnosi)p.odnosi="";
    if(!p.healthStatus)p.healthStatus="good";
  });
}

function save(){
  localStorage.setItem("lj_pets",JSON.stringify(state.pets));
  localStorage.setItem("lj_logs",JSON.stringify(state.logs));
  localStorage.setItem("lj_weights",JSON.stringify(state.weights));
  localStorage.setItem("lj_events",JSON.stringify(state.events));
  localStorage.setItem("lj_appetite",JSON.stringify(state.appetiteLogs));
  localStorage.setItem("lj_vet",JSON.stringify(state.globalVet));
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function petEmoji(p){return p.vrsta==="pas"?"🐶":"🐱";}
function petLabel(p){return p.vrsta==="pas"?"Pas":"Mačka";}
function kats(p){return p.vrsta==="pas"?KATS_PSA:KATS_MAC;}

function render(){renderNav();renderMain();}

function renderNav(){
  var tabs=[{id:"ljubimci",label:"🐾 Ljubimci"},{id:"pregled",label:"📋 Pregled"},{id:"dnevnik",label:"📖 Dnevnik"},{id:"kalendar",label:"📅 Kalendar"},{id:"datumi",label:"🎂 Rođendani"},{id:"budzet",label:"💰 Budžet"}];
  document.getElementById("nav").innerHTML=tabs.map(function(t){return "<button class='nb"+(state.tab===t.id?" active":"")+"' onclick=\"setTab('"+t.id+"')\">"+t.label+"</button>";}).join("");
}

function setTab(t){
  state.tab=t;state.selected=null;state.editingField=null;state.editingMedId=null;
  state.showAddForm=false;state.showLogForm=false;state.showWeightForm=false;state.showEventForm=false;
  state.showAppetiteForm=false;state.showVaxForm=false;state.showMedForm=false;state.showParForm=false;
  state.showExpForm=false;state.showVetForm=false;state.showVetPetForm=false;state.showMoodForm=false;
  render();
}

function renderMain(){
  var m=document.getElementById("main");
  if(state.tab==="ljubimci"){if(state.selected)m.innerHTML=renderProfile();else m.innerHTML=renderPetList();}
  else if(state.tab==="pregled")m.innerHTML=renderPregled();
  else if(state.tab==="dnevnik")m.innerHTML=renderDnevnik();

function renderPetList(){

  }

  var locations={};
  state.pets.forEach(function(p){var loc=p.lokacija||"Bez lokacije";if(!locations[loc])locations[loc]=[];locations[loc].push(p);});

function toggleAddForm(){state.showAddForm=!state.showAddForm;state.newPet={vrsta:"macka",ime:"",spol:"Ženka",sterilizirana:false,rodjendan:"",lokacija:"",boja:"",oci:"",licnost:"",porijeklo:""};render();}
function setSpecies(s){state.newPet.vrsta=s;state.newPet.spol=s==="macka"?"Ženka":"Mužjak";render();}

function submitNewPet(){
  var ime=document.getElementById("new-ime").value.trim();
  if(!ime){alert("Unesite ime ljubimca!");return;}
  var pet={
    id:uid(),vrsta:state.newPet.vrsta,ime:ime,
    spol:document.getElementById("new-spol").value,
    sterilizirana:document.getElementById("new-steril").value==="true",
    rodjendan:document.getElementById("new-rodjendan").value,
    lokacija:document.getElementById("new-lokacija").value,
    boja:document.getElementById("new-boja").value,
    oci:state.newPet.vrsta==="macka"&&document.getElementById("new-oci")?document.getElementById("new-oci").value:"",
    tezina:null,
    licnost:document.getElementById("new-licnost").value,
    odnosi:"",porijeklo:document.getElementById("new-porijeklo").value,
    healthStatus:"good",profilePhoto:"",photos:[],medical:[],zastave:[],
    diet:{hrana:"",tip:"",raspored:"",porcija:"",favoriti:"",izbjegavati:""},
    cjepiva:[],lijekovi:[],paraziti:[],troskovi:[],
    vet:{ime:"",telefon:"",adresa:"",email:""},raspolozenje:[]
  };
  state.pets.push(pet);state.showAddForm=false;
  state.newPet={vrsta:"macka",ime:"",spol:"Ženka",sterilizirana:false,rodjendan:"",lokacija:"",boja:"",oci:"",licnost:"",porijeklo:""};
  save();render();
}

function selectPet(id){state.selected=state.pets.find(function(p){return p.id===id;});state.editingField=null;state.editingMedId=null;state.showLogForm=false;state.showWeightForm=false;render();}
function goBack(){state.selected=null;state.editingField=null;state.editingMedId=null;state.showLogForm=false;state.showWeightForm=false;render();}
function deletePet(id){if(!confirm("Jeste li sigurni? Ova radnja se ne može poništiti."))return;state.pets=state.pets.filter(function(p){return p.id!==id;});state.selected=null;save();render();}

// EDITABLE FIELDS
function getV(obj,path){return path.split('.').reduce(function(o,k){return o&&o[k]!==undefined?o[k]:"";},obj);}
function setV(obj,path,val){var keys=path.split('.');var o=obj;for(var i=0;i<keys.length-1;i++){if(!o[keys[i]])o[keys[i]]={};o=o[keys[i]];}o[keys[keys.length-1]]=val;}

function ef(p,field,label){
  var val=getV(p,field);var sid=field.replace('.','__');
  if(state.editingField===field){
    return "<div>"+(label?"<div class='il'>"+label+"</div>":"")+"<input class='ei' id='ef-"+sid+"' value='"+(val||"").replace(/'/g,"&#39;")+"'>" +
      "<div class='erow'><button class='btn bp' style='font-size:.74rem;padding:.28rem .65rem' onclick='saveField(\""+p.id+"\",\""+field+"\")'>Spremi</button><button class='btn bs' style='font-size:.74rem;padding:.28rem .65rem' onclick='cancelEdit()'>Odustani</button></div></div>";
  }
  return "<div>"+(label?"<div class='il'>"+label+"</div>":"")+"<div class='iv editable' onclick='startEdit(\""+field+"\")'><span>"+(val||"—")+"</span></div></div>";
}

function eta(p,field){
  var val=getV(p,field);var sid=field.replace('.','__');
  if(state.editingField===field){
    return "<div><textarea class='eta' id='ef-"+sid+"'>"+(val||"")+"</textarea><div class='erow'><button class='btn bp' style='font-size:.74rem;padding:.28rem .65rem' onclick='saveField(\""+p.id+"\",\""+field+"\")'>Spremi</button><button class='btn bs' style='font-size:.74rem;padding:.28rem .65rem' onclick='cancelEdit()'>Odustani</button></div></div>";
  }
  return "<div class='editable' onclick='startEdit(\""+field+"\")'  style='font-size:.83rem;line-height:1.6;cursor:pointer'><span style='flex:1'>"+(val||"<em style=\"color:var(--rust)\">Klikni za uređivanje</em>")+"</span></div>";
}

function startEdit(f){state.editingField=f;render();setTimeout(function(){var el=document.getElementById("ef-"+f.replace('.','__'));if(el){el.focus();if(el.select)el.select();}},50);}
function cancelEdit(){state.editingField=null;render();}
function saveField(id,field){
  var el=document.getElementById("ef-"+field.replace('.','__'));if(!el)return;
  var pet=state.pets.find(function(p){return p.id===id;});if(!pet)return;
  setV(pet,field,el.value);if(state.selected&&state.selected.id===id)setV(state.selected,field,el.value);
  state.editingField=null;save();render();
}
function startMedEdit(id){state.editingMedId=id;render();}
function cancelMedEdit(){state.editingMedId=null;render();}
function saveMedEdit(petId,medId){
  var pet=state.pets.find(function(p){return p.id===petId;});
  pet.medical=pet.medical.map(function(m){return m.id===medId?{id:m.id,datum:document.getElementById("edat").value,kategorija:document.getElementById("ekat").value,biljeska:document.getElementById("ebil").value}:m;});
  if(state.selected&&state.selected.id===petId)state.selected=pet;state.editingMedId=null;save();render();
}
function deleteMed(petId,medId){var pet=state.pets.find(function(p){return p.id===petId;});pet.medical=pet.medical.filter(function(m){return m.id!==medId;});if(state.selected&&state.selected.id===petId)state.selected=pet;save();render();}
function deleteLog(logId){state.logs=state.logs.filter(function(l){return l.id!==logId;});save();render();}

  Object.keys(map).forEach(function(k){state[map[k]]=(k===type)?!state[map[k]]:false;});render();
}

// DATUMI
function daysUntil(s){
  if(!s||s==="Nepoznat")return null;
  var now=new Date();var y=now.getFullYear();var month=-1,day=-1;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s);month=d.getMonth();day=d.getDate();}
  var hr={"siječnja":0,"veljače":1,"ožujka":2,"travnja":3,"svibnja":4,"lipnja":5,"srpnja":6,"kolovoza":7,"rujna":8,"listopada":9,"studenog":10,"prosinca":11,"siječanj":0,"veljača":1,"ožujak":2,"travanj":3,"svibanj":4,"lipanj":5,"srpanj":6,"kolovoz":7,"rujan":8,"listopad":9,"studeni":10,"prosinac":11};
  var parts=s.toLowerCase().split(/[\s.]+/);
  parts.forEach(function(p,i){if(hr[p]!==undefined){month=hr[p];day=parseInt(parts[i-1]||parts[i+1]);}});
  if(month===-1||!day)return null;
  var next=new Date(y,month,day);if(next<now)next=new Date(y+1,month,day);
  return Math.round((next-now)/86400000);
}

  var items=state.pets.flatMap(function(p){var arr=[];var b=daysUntil(p.rodjendan);if(b!==null)arr.push({pet:p,days:b,type:"Ro\u0111endan \U0001f382",date:p.rodjendan});return arr;}).sort(function(a,b){return a.days-b.days;});
  return "<div class='sc'><div class='st'><span>🎂 Rođendani</span></div>" +

// PHOTOS
function compressImage(file,maxPx,quality,cb){
  var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement("canvas");var w=img.width,h=img.height;if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(c.toDataURL("image/jpeg",quality));};img.src=e.target.result;};r.readAsDataURL(file);
}

function attachPhotoListeners(){
  document.querySelectorAll("input[data-action='pfp']").forEach(function(inp){
    inp.addEventListener("change",function(){
      var petId=this.dataset.petid;var file=this.files[0];if(!file)return;
      compressImage(file,800,0.82,function(dataUrl){
        var pet=state.pets.find(function(p){return p.id===petId;});if(!pet)return;
        pet.profilePhoto=dataUrl;if(state.selected&&state.selected.id===petId)state.selected=pet;save();
        var prev=document.getElementById("pfp-preview-"+petId);if(prev)prev.innerHTML="<img src='"+dataUrl+"' alt=''>";
        var card=document.querySelector(".pet-card[data-petid='"+petId+"'] .cc-photo");
        if(card)card.innerHTML="<img src='"+dataUrl+"' alt=''><div class='hdot "+(pet.healthStatus==="alert"?"da":pet.healthStatus==="watch"?"dw":"dg")+"'></div>";
      });
    });
  });
  document.querySelectorAll("input[data-action='gallery']").forEach(function(inp){
    inp.addEventListener("change",function(){
      var petId=this.dataset.petid;var files=Array.from(this.files);if(!files.length)return;
      var gallery=document.getElementById("gallery-"+petId);var pending=files.length;var results=[];
      files.forEach(function(file,idx){
        compressImage(file,800,0.82,function(dataUrl){
          results[idx]=dataUrl;pending--;
          if(pending===0){
            var pet=state.pets.find(function(p){return p.id===petId;});if(!pet)return;
            pet.photos=[...(pet.photos||[]),...results].slice(0,10);if(state.selected&&state.selected.id===petId)state.selected=pet;save();
            if(gallery){
              var h=pet.photos.map(function(ph,i){return "<div class='gthumb' onclick='openLightbox(this.querySelector(\"img\").src)'><img src='"+ph+"' alt=''><button class='gdel' onclick='event.stopPropagation();deletePhoto(\""+petId+"\","+i+")'>✕</button></div>";}).join("");
              if(pet.photos.length<10)h+="<label class='gadd-label'>+<input type='file' accept='image/*' multiple data-action='gallery' data-petid='"+petId+"'></label>";
              gallery.innerHTML=h;attachPhotoListeners();
            }
          }
        });
      });
    });
  });
  document.querySelectorAll("canvas[id^='wchart-']").forEach(function(canvas){
    var petId=canvas.id.replace("wchart-","");drawWeightChart(canvas,petId);
  });
}

function drawWeightChart(canvas,petId){
  var entries=state.weights[petId]||[];if(entries.length<2)return;
  var ctx=canvas.getContext("2d");var W=canvas.width,H=canvas.height;
  var vals=entries.map(function(e){return e.value;});var mn=Math.min(...vals)-0.3,mx=Math.max(...vals)+0.3;
  ctx.clearRect(0,0,W,H);ctx.strokeStyle="#c0714f";ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.lineCap="round";
  ctx.beginPath();entries.forEach(function(e,i){var x=(i/(entries.length-1))*W;var y=H-((e.value-mn)/(mx-mn))*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  entries.forEach(function(e,i){var x=(i/(entries.length-1))*W;var y=H-((e.value-mn)/(mx-mn))*H;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle="#c0714f";ctx.fill();});
}

function openLightbox(src){document.getElementById("lightbox-img").src=src;document.getElementById("lightbox").classList.remove("hidden");}
function closeLightbox(){document.getElementById("lightbox").classList.add("hidden");}

load();render();
</script>
