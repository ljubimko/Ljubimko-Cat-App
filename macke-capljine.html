<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mačke">
<meta name="application-name" content="Mačke">
<meta name="theme-color" content="#6b4423">
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;: &quot;Ma%C4%8Dke&quot;,
  &quot;short_name&quot;: &quot;Ma%C4%8Dke&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;background_color&quot;: &quot;%23f5f0e8&quot;,
  &quot;theme_color&quot;: &quot;%236b4423&quot;,
  &quot;start_url&quot;: &quot;.&quot;
}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mačke</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--parchment:#ede4d0;--sand:#d9c9a8;
  --terracotta:#c0714f;--rust:#a0522d;--bark:#6b4423;
  --ink:#2c1f0e;--warm:#faf7f2;--shadow:rgba(44,31,14,0.15);
  --green:#7fb069;--yellow:#e9c46a;--red:#e07a5f;
}
body{background:var(--cream);font-family:'Lora',serif;color:var(--ink);min-height:100vh}
.app{min-height:100vh;background:radial-gradient(ellipse at 10% 20%,rgba(192,113,79,0.08),transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(122,140,94,0.07),transparent 50%),var(--cream)}
/* HEADER */
.header{background:linear-gradient(135deg,var(--bark),#3d2510);padding:1.6rem 1.5rem 1.2rem;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2rem);color:var(--cream);letter-spacing:.04em}
.header p{font-style:italic;color:var(--sand);font-size:.85rem;margin-top:.2rem}
/* NAV */
nav{display:flex;background:var(--parchment);border-bottom:2px solid var(--sand);overflow-x:auto;scrollbar-width:none;position:sticky;top:72px;z-index:99}
nav::-webkit-scrollbar{display:none}
.nb{flex:none;padding:.65rem 1rem;font-family:'Lora',serif;font-size:.78rem;font-weight:600;color:var(--bark);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.nb:hover{background:var(--sand)}
.nb.active{color:var(--terracotta);border-bottom-color:var(--terracotta);background:var(--warm)}
/* MAIN */
.main{padding:1.4rem 1rem 5rem;max-width:900px;margin:0 auto}
/* SECTION CARD */
.sc{background:var(--warm);border:1px solid var(--sand);border-radius:12px;padding:1.1rem;margin-bottom:1rem;box-shadow:0 1px 4px var(--shadow)}
.st{font-family:'Playfair Display',serif;font-size:.93rem;color:var(--bark);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;padding-bottom:.5rem;border-bottom:1px solid var(--parchment)}
/* CAT GRID */
.loc-label{font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;color:var(--rust);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.loc-label::after{content:'';flex:1;height:1px;background:var(--sand)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.9rem;margin-bottom:1.6rem}
.cat-card{background:var(--warm);border:1px solid var(--sand);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px var(--shadow)}
.cat-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px var(--shadow)}
.cc-photo{width:100%;height:130px;background:linear-gradient(135deg,var(--parchment),var(--sand));display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
.cc-photo img{width:100%;height:100%;object-fit:cover}
.hdot{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dg{background:var(--green)}.dw{background:var(--yellow)}.da{background:var(--red)}
.cc-body{padding:.75rem .9rem}
.cc-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--bark)}
.cc-meta{font-size:.73rem;color:var(--rust);margin-top:.15rem;font-style:italic}
.cc-w{margin-top:.4rem;font-size:.73rem;background:var(--parchment);display:inline-block;padding:.1rem .4rem;border-radius:20px}
/* PROFILE */
.profile{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:none;border:none;cursor:pointer;font-family:'Lora',serif;font-size:.82rem;color:var(--rust);margin-bottom:1rem;padding:.3rem 0;border-bottom:1px solid transparent;transition:border-color .2s}
.back-btn:hover{border-bottom-color:var(--rust)}
.ph{background:linear-gradient(135deg,var(--bark),#4a2d12);border-radius:16px;padding:1.3rem;color:var(--cream);margin-bottom:1rem;display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.pfp-wrap{position:relative;flex-shrink:0}
.pfp-img{width:85px;height:85px;border-radius:10px;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:2.6rem;overflow:hidden;border:3px solid rgba(255,255,255,.2)}
.pfp-img img{width:100%;height:100%;object-fit:cover}
.pfp-label{position:absolute;bottom:-6px;right:-6px;background:var(--terracotta);color:white;border:2px solid white;border-radius:50%;width:26px;height:26px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pfp-label input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;font-size:0}
.ph-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.ph-sub{font-style:italic;color:var(--sand);font-size:.82rem;margin-top:.2rem}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.55rem}
.tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:.16rem .5rem;font-size:.69rem}
/* INFO GRID */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.il{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--rust)}
.iv{font-size:.83rem;color:var(--ink);margin-top:.1rem}
.editable{cursor:pointer;display:flex;align-items:flex-start;gap:.3rem}
.editable span{flex:1}
.editable::after{content:'✏️';font-size:.65rem;flex-shrink:0;margin-top:.1rem}
/* FORMS */
.lf{background:var(--parchment);border-radius:10px;padding:.9rem;margin-top:.7rem}
.lf input,.lf select,.lf textarea{width:100%;font-family:'Lora',serif;font-size:.82rem;padding:.42rem .6rem;border:1px solid var(--sand);border-radius:8px;background:var(--warm);color:var(--ink);margin-bottom:.42rem;outline:none;transition:border-color .2s}
.lf input:focus,.lf select:focus,.lf textarea:focus{border-color:var(--terracotta)}
.lf textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.btn{font-family:'Lora',serif;font-size:.82rem;font-weight:600;padding:.42rem 1rem;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.bp{background:var(--terracotta);color:white}.bp:hover{background:var(--rust)}
.bs{background:var(--sand);color:var(--bark)}.bs:hover{background:var(--parchment)}
.bd{background:none;border:1px solid var(--red);color:var(--red);font-size:.7rem;padding:.18rem .45rem;border-radius:6px;cursor:pointer}
.bd:hover{background:#fff0ee}
.be{background:none;border:1px solid var(--sand);color:var(--bark);font-size:.7rem;padding:.18rem .45rem;border-radius:6px;cursor:pointer}
.be:hover{background:var(--parchment)}
/* LOG ENTRIES */
.le{padding:.52rem .72rem;border-left:3px solid var(--sand);margin-bottom:.52rem;background:var(--parchment);border-radius:0 8px 8px 0;font-size:.8rem}
.le:last-child{margin-bottom:0}
.lm{display:flex;gap:.4rem;margin-bottom:.18rem;align-items:center;flex-wrap:wrap}
.ld{font-size:.68rem;color:var(--rust);font-style:italic}
.lcb{font-size:.65rem;background:var(--sand);color:var(--bark);padding:.08rem .36rem;border-radius:10px;font-weight:600}
.lcat{font-size:.65rem;padding:.08rem .36rem;border-radius:10px;font-weight:600}
.cZdravlje{background:#fce4d6;color:#8b3a1f}.cTežina{background:#d6e8d6;color:#2d5a2d}
.cPonašanje{background:#e8e0f0;color:#4a2d6b}.cVeterinar{background:#d6eaf8;color:#1a4d6b}
.cLijek{background:#fef9e0;color:#7d6a00}.cBilješka{background:#f0f0f0;color:#444}
/* FLAGS */
.fi{display:flex;align-items:flex-start;gap:.4rem;padding:.42rem .62rem;background:#fff8e7;border:1px solid #e9c46a;border-radius:8px;font-size:.78rem;margin-bottom:.35rem;color:#7d5a00}
/* WEIGHT */
.wr{display:flex;justify-content:space-between;align-items:center;padding:.28rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.wr:last-child{border-bottom:none}
.wv{font-weight:600;color:var(--bark)}
canvas{width:100%;height:80px;display:block;margin-bottom:.5rem}
/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:.6rem}
.gthumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--parchment);cursor:pointer}
.gthumb img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}
.gthumb:hover img{opacity:.85}
.gdel{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:.68rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gadd-label{aspect-ratio:1;border-radius:8px;border:2px dashed var(--sand);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--parchment);font-size:1.4rem;color:var(--rust);transition:background .2s;position:relative;overflow:hidden}
.gadd-label:hover{background:var(--sand)}
.gadd-label input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;font-size:0}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain}
/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1rem}
.stat{background:var(--warm);border:1px solid var(--sand);border-radius:12px;padding:.9rem;text-align:center}
.sn{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--terracotta);font-weight:700}
.sl{font-size:.73rem;color:var(--rust);margin-top:.15rem;font-style:italic}
.ai{display:flex;gap:.55rem;align-items:flex-start;padding:.5rem .72rem;background:#fff8e7;border-left:3px solid var(--terracotta);border-radius:0 8px 8px 0;font-size:.78rem;margin-bottom:.42rem}
.ac{font-weight:600;color:var(--bark);min-width:88px;flex-shrink:0}
/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.cal-month{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--bark)}
.cal-nav{background:none;border:1px solid var(--sand);border-radius:8px;padding:.28rem .8rem;cursor:pointer;font-size:1rem;color:var(--bark);transition:background .2s;font-family:'Lora',serif}
.cal-nav:hover{background:var(--sand)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.9rem}
.cdn{text-align:center;font-size:.6rem;font-weight:600;color:var(--rust);text-transform:uppercase;padding:.35rem 0;background:var(--parchment);border-radius:5px}
.cd{min-height:44px;border-radius:7px;padding:.25rem .18rem;background:var(--warm);border:1px solid var(--parchment);transition:background .2s;overflow:hidden}
.cd:not(.empty):hover{background:var(--parchment)}
.cd.empty{background:transparent;border-color:transparent}
.cd.today{border-color:var(--terracotta);background:#fff5f0}
.cdn2{font-weight:600;color:var(--bark);font-size:.72rem;text-align:center}
.cev{font-size:.5rem;background:var(--terracotta);color:white;border-radius:6px;padding:.04rem .2rem;margin-top:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ev-item{display:flex;gap:.55rem;align-items:flex-start;padding:.52rem .72rem;background:var(--parchment);border-left:3px solid var(--terracotta);border-radius:0 8px 8px 0;font-size:.8rem;margin-bottom:.45rem}
.ev-date{font-size:.7rem;color:var(--rust);font-style:italic;min-width:82px;flex-shrink:0}
/* HIERARCHY */
.hr-row{display:flex;align-items:center;gap:.7rem;padding:.44rem 0;border-bottom:1px solid var(--parchment);font-size:.82rem}
.hr-row:last-child{border-bottom:none}
.hr-rank{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--terracotta);min-width:20px;text-align:center}
.hr-name{font-weight:600;color:var(--bark);min-width:100px}
.hr-lbl{color:var(--rust);font-size:.74rem;font-style:italic}
/* FILTER BTNS */
.fbs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.fb{padding:.2rem .62rem;border-radius:20px;border:1px solid var(--sand);background:var(--warm);font-family:'Lora',serif;font-size:.72rem;cursor:pointer;color:var(--bark);transition:all .2s}
.fb.active{background:var(--terracotta);color:white;border-color:var(--terracotta)}
.empty{text-align:center;padding:1.6rem;color:var(--rust);font-style:italic;font-size:.86rem}
/* EDIT INLINE */
.ei{font-family:'Lora',serif;font-size:.83rem;padding:.3rem .5rem;border:1px solid var(--terracotta);border-radius:6px;background:var(--warm);color:var(--ink);outline:none;width:100%}
.eta{font-family:'Lora',serif;font-size:.8rem;padding:.32rem .5rem;border:1px solid var(--terracotta);border-radius:6px;background:var(--warm);color:var(--ink);outline:none;width:100%;resize:vertical;min-height:58px}
.erow{display:flex;gap:.35rem;margin-top:.3rem}
/* DIET */
.diet-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.7rem}
.appetite-row{display:flex;align-items:center;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.appetite-row:last-child{border-bottom:none}
.ap-score{display:flex;gap:.3rem}
.ap-btn{background:none;border:1px solid var(--sand);border-radius:6px;padding:.15rem .4rem;cursor:pointer;font-size:.75rem;transition:all .2s}
.ap-btn.active{background:var(--terracotta);color:white;border-color:var(--terracotta)}
/* VACCINE */
.vax-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.vax-row:last-child{border-bottom:none}
.vax-name{font-weight:600;color:var(--bark);min-width:120px}
.vax-date{color:var(--rust);font-size:.74rem;font-style:italic;flex:1}
.vax-due{font-size:.72rem;padding:.1rem .4rem;border-radius:10px;font-weight:600}
.vax-ok{background:#d6e8d6;color:#2d5a2d}
.vax-soon{background:#fef9e0;color:#7d6a00}
.vax-overdue{background:#fce4d6;color:#8b3a1f}
/* MEDS */
.med-active-row{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem .7rem;background:#f0f7ff;border-left:3px solid #5b9bd5;border-radius:0 8px 8px 0;margin-bottom:.4rem;font-size:.8rem}
.med-name{font-weight:600;color:var(--bark)}
/* PARASITE */
.par-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.par-row:last-child{border-bottom:none}
.par-name{font-weight:600;color:var(--bark);min-width:120px}
.par-due{font-size:.72rem;padding:.1rem .4rem;border-radius:10px;font-weight:600}
/* EXPENSE */
.exp-row{display:flex;align-items:center;gap:.6rem;padding:.38rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.exp-row:last-child{border-bottom:none}
.exp-amt{font-weight:700;color:var(--bark);min-width:60px;text-align:right}
.exp-cat{font-size:.66rem;padding:.08rem .36rem;border-radius:10px;font-weight:600;background:var(--parchment);color:var(--bark)}
.exp-total{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--terracotta);font-weight:700;text-align:right;padding:.5rem 0}
/* VET CARD */
.vet-card{background:linear-gradient(135deg,#e8f4e8,#d6ead6);border:1px solid #b8d4b8;border-radius:10px;padding:.9rem;margin-bottom:.6rem}
.vet-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--bark);font-weight:700}
.vet-info{font-size:.8rem;color:var(--ink);margin-top:.3rem;line-height:1.7}
.vet-info a{color:var(--rust);text-decoration:none}
/* EMERGENCY CARD */
.emergency-card{background:linear-gradient(135deg,var(--bark),#3d2510);color:var(--cream);border-radius:12px;padding:1.2rem;margin-bottom:.8rem}
.em-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.7rem;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:.4rem}
.em-row{display:flex;gap:.5rem;font-size:.78rem;margin-bottom:.3rem}
.em-label{opacity:.7;min-width:100px;flex-shrink:0}
.em-val{font-weight:600}
@media print{nav,.back-btn,.nb,.btn,.pfp-label,.gadd-label,.bdprint{display:none!important}.emergency-card{break-inside:avoid}}
/* BIRTHDAYS */
.bday-card{background:linear-gradient(135deg,#fff8e7,#fef0cc);border:1px solid #e9c46a;border-radius:10px;padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem}
.bday-emoji{font-size:1.8rem;flex-shrink:0}
.bday-name{font-weight:700;color:var(--bark);font-size:.9rem}
.bday-sub{font-size:.75rem;color:var(--rust);font-style:italic;margin-top:.1rem}
.bday-days{font-family:"Playfair Display",serif;font-size:1.3rem;color:var(--terracotta);font-weight:700;margin-left:auto;flex-shrink:0}
.bday-today{background:linear-gradient(135deg,#fff0e6,#ffd9c0);border-color:var(--terracotta)}
/* MOOD */
.mood-row{display:flex;align-items:center;gap:.6rem;padding:.38rem 0;border-bottom:1px solid var(--parchment);font-size:.8rem}
.mood-row:last-child{border-bottom:none}
.mood-score{font-size:1.1rem}
/* HIDDEN */
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>🐾 Mačke 🐾</h1>
    <p>Zdravstveni kartoni · 8 mačaka · Svaki život zabilježen</p>
  </header>
  <nav id="nav"></nav>
  <main class="main" id="main"></main>
</div>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────

function load() {
  try { state.cats = JSON.parse(localStorage.getItem("mc_cats")) || deepCopy(CATS0); } catch { state.cats = deepCopy(CATS0); }
  // Ensure all cats have new fields
  state.cats.forEach(cat => {
    if (!cat.diet) cat.diet = {hrana:"",tip:"",raspored:"",porcija:"",favoriti:"",izbjegavati:""};
    if (!cat.cjepiva) cat.cjepiva = [];
    if (!cat.lijekovi) cat.lijekovi = [];
  });
  try { state.logs = JSON.parse(localStorage.getItem("mc_logs")) || []; } catch { state.logs = []; }
  try { state.weights = JSON.parse(localStorage.getItem("mc_weights")) || {}; } catch { state.weights = {}; }
  try { state.events = JSON.parse(localStorage.getItem("mc_events")) || []; } catch { state.events = []; }
  try { state.appetiteLogs = JSON.parse(localStorage.getItem("mc_appetite")) || []; } catch { state.appetiteLogs = []; }
  try { state.globalVet = JSON.parse(localStorage.getItem("mc_vet")) || {ime:"",telefon:"",adresa:"",email:""}; } catch { state.globalVet = {ime:"",telefon:"",adresa:"",email:""}; }
  try { state.troskovi = JSON.parse(localStorage.getItem("mc_troskovi")) || []; } catch { state.troskovi = []; }
  // Ensure new fields on existing cats
  state.cats.forEach(cat => {
    if (!cat.paraziti) cat.paraziti = [];
    if (!cat.troskovi) cat.troskovi = [];
    if (!cat.vet) cat.vet = {ime:"",telefon:"",adresa:"",email:""};
    if (!cat.raspolozenje) cat.raspolozenje = [];
  });
}
function save() {
  localStorage.setItem("mc_cats", JSON.stringify(state.cats));
  localStorage.setItem("mc_logs", JSON.stringify(state.logs));
  localStorage.setItem("mc_weights", JSON.stringify(state.weights));
  localStorage.setItem("mc_events", JSON.stringify(state.events));
  localStorage.setItem("mc_appetite", JSON.stringify(state.appetiteLogs||[]));
  localStorage.setItem("mc_vet", JSON.stringify(state.globalVet||{}));
  localStorage.setItem("mc_troskovi", JSON.stringify(state.troskovi||[]));
}
function deepCopy(x) { return JSON.parse(JSON.stringify(x)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayStr() { return today(); }

function updateCat(id, patch) {
  state.cats = state.cats.map(c => c.id === id ? {...c, ...patch} : c);
  if (state.selected && state.selected.id === id) state.selected = state.cats.find(c => c.id === id);
  save();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  renderNav();
  renderMain();
}

function renderNav() {
  const tabs = [
    {id:"macke",label:"🐱 Mačke"},
    {id:"pregled",label:"📋 Pregled"},
    {id:"dnevnik",label:"📖 Dnevnik"},
    {id:"kalendar",label:"📅 Kalendar"},
    {id:"hijerarhija",label:"👑 Hijerarhija"},
    {id:"rodjendan",label:"🎂 Datumi"},
    {id:"budzet",label:"💰 Budžet"},
  ];
  document.getElementById("nav").innerHTML = tabs.map(t =>
    `<button class="nb${state.tab===t.id?" active":""}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function setTab(t) {
  state.tab = t;
  state.selected = null;
  state.editingField = null;
  state.editingMedId = null;
  state.showLogForm = false;
  state.showWeightForm = false;
  state.showEventForm = false;
  render();
}

function renderMain() {
  const m = document.getElementById("main");
  if (state.tab === "macke") {
    if (state.selected) m.innerHTML = renderProfile();
    else m.innerHTML = renderCatList();
  } else if (state.tab === "pregled") m.innerHTML = renderOverview();
  else if (state.tab === "dnevnik") m.innerHTML = renderDnevnik();
  else if (state.tab === "kalendar") m.innerHTML = renderKalendar();
  else if (state.tab === "hijerarhija") m.innerHTML = renderHijerarhija();
  else if (state.tab === "rodjendan") m.innerHTML = renderBirthdayTab();
  else if (state.tab === "budzet") m.innerHTML = renderBudzet();
  attachPhotoListeners();
}

// ── CAT LIST ──────────────────────────────────────────────────────────────
function renderCatList() {
  const house = state.cats.filter(c => c.lokacija === "Glavna kuća");
  const ljetna = state.cats.filter(c => c.lokacija === "Ljetna");
  return `
    <div class="loc-label">🏠 Glavna kuća</div>
    <div class="cat-grid">${house.map(catCard).join("")}</div>
    <div class="loc-label">🌿 Ljetna</div>
    <div class="cat-grid">${ljetna.map(catCard).join("")}</div>
  `;
}

function catCard(c) {
  const w = state.weights[c.id];
  const latest = w && w.length ? w[w.length-1].value : c.tezina;
  const dc = {good:"dg",watch:"dw",alert:"da"}[c.healthStatus];
  const photo = c.profilePhoto ? `<img src="${c.profilePhoto}" alt="">` : `<span>${c.emoji}</span>`;
  return `
    <div class="cat-card" data-catid="${c.id}" onclick="selectCat(${c.id})">
      <div class="cc-photo">${photo}<div class="hdot ${dc}"></div></div>
      <div class="cc-body">
        <div class="cc-name">${c.emoji} ${c.name}</div>
        <div class="cc-meta">${c.lokacija} · ${c.spol}</div>
        ${latest ? `<div class="cc-w">⚖️ ${latest} kg</div>` : ""}
      </div>
    </div>`;
}

function selectCat(id) {
  state.selected = state.cats.find(c => c.id === id);
  state.editingField = null;
  state.editingMedId = null;
  state.showLogForm = false;
  state.showWeightForm = false;
  render();
}

  return `

    </div>`;
}

function getNestedVal(obj, path) {
  return path.split('.').reduce((o,k) => (o&&o[k]!==undefined?o[k]:""), obj);
}
function setNestedVal(obj, path, val) {
  const keys = path.split('.');
  let o = obj;
  for (let i=0;i<keys.length-1;i++) { if(!o[keys[i]])o[keys[i]]={};o=o[keys[i]]; }
  o[keys[keys.length-1]] = val;
}

function editableField(c, field, label) {
  const val = getNestedVal(c, field);
  const safeId = field.replace('.','__');
  if (state.editingField === field) {
    return `<div>
      ${label ? `<div class="il">${label}</div>` : ""}
      <input class="ei" id="ef-${safeId}" value="${(val||"").replace(/"/g,'&quot;')}">
      <div class="erow">
        <button class="btn bp" style="font-size:.74rem;padding:.28rem .65rem" onclick="saveField(${c.id},'${field}')">Spremi</button>
        <button class="btn bs" style="font-size:.74rem;padding:.28rem .65rem" onclick="cancelEdit()">Odustani</button>
      </div>
    </div>`;
  }
  return `<div>
    ${label ? `<div class="il">${label}</div>` : ""}
    <div class="iv editable" onclick="startEdit('${field}')"><span>${val||"—"}</span></div>
  </div>`;
}

function editableTextarea(c, field) {
  const val = getNestedVal(c, field);
  const safeId = field.replace('.','__');
  if (state.editingField === field) {
    return `<div>
      <textarea class="eta" id="ef-${safeId}">${val||""}</textarea>
      <div class="erow">
        <button class="btn bp" style="font-size:.74rem;padding:.28rem .65rem" onclick="saveField(${c.id},'${field}')">Spremi</button>
        <button class="btn bs" style="font-size:.74rem;padding:.28rem .65rem" onclick="cancelEdit()">Odustani</button>
      </div>
    </div>`;
  }
  return `<div class="editable" onclick="startEdit('${field}')" style="font-size:.83rem;line-height:1.6;cursor:pointer">
    <span style="flex:1">${val||'<em style="color:var(--rust)">Klikni za uređivanje</em>'}</span>
  </div>`;
}

function startEdit(f) { state.editingField=f; render(); setTimeout(()=>{ const el=document.getElementById("ef-"+f); if(el){el.focus();if(el.select)el.select();}},50); }

function saveField(id, field) {
  const safeId = field.replace('.','__');
  const el = document.getElementById("ef-"+safeId);
  if (!el) return;
  const cat = state.cats.find(c=>c.id===id);
  if (!cat) return;
  setNestedVal(cat, field, el.value);
  if (state.selected && state.selected.id===id) setNestedVal(state.selected, field, el.value);
  state.editingField = null;
  save(); render();
}

function compressImage(file, maxPx, quality, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL("image/jpeg", quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function attachPhotoListeners() {
  // Profile photo
  document.querySelectorAll("input[data-action='pfp']").forEach(function(input) {
    input.addEventListener("change", function() {
      const catId = parseInt(this.dataset.catid);
      const file = this.files[0];
      if (!file) return;
      compressImage(file, 800, 0.82, function(dataUrl) {
        const cat = state.cats.find(c => c.id === catId);
        if (!cat) return;
        cat.profilePhoto = dataUrl;
        if (state.selected && state.selected.id === catId) state.selected = cat;
        save();
        const preview = document.getElementById("pfp-preview-" + catId);
        if (preview) preview.innerHTML = '<img src="' + dataUrl + '" alt="">';
        const cardPhoto = document.querySelector(".cat-card[data-catid='" + catId + "'] .cc-photo");
        if (cardPhoto) cardPhoto.innerHTML = '<img src="' + dataUrl + '" alt=""><div class="hdot ' + {good:"dg",watch:"dw",alert:"da"}[cat.healthStatus] + '"></div>';
      });
    });
  });

  // Gallery photos
  document.querySelectorAll("input[data-action='gallery']").forEach(function(input) {
    input.addEventListener("change", function() {
      const catId = parseInt(this.dataset.catid);
      const files = Array.from(this.files);
      if (!files.length) return;
      const gallery = document.getElementById("gallery-" + catId);
      var pending = files.length;
      var results = [];
      files.forEach(function(file, idx) {
        compressImage(file, 800, 0.82, function(dataUrl) {
          results[idx] = dataUrl;
          pending--;
          if (pending === 0) {
            const cat = state.cats.find(c => c.id === catId);
            if (!cat) return;
            cat.photos = [...(cat.photos || []), ...results].slice(0, 10);
            if (state.selected && state.selected.id === catId) state.selected = cat;
            save();
            if (gallery) {
              var thumbsHtml = "";
              cat.photos.forEach(function(p, i) {
                thumbsHtml += "<div class=\"gthumb\" onclick=\"openLightbox(this.querySelector('img').src)\">";
                thumbsHtml += "<img src=\"" + p + "\" alt=\"\"/>";
                thumbsHtml += "<button class=\"gdel\" onclick=\"event.stopPropagation();deletePhoto(" + catId + "," + i + ")\">✕</button>";
                thumbsHtml += "</div>";
              });
              if (cat.photos.length < 10) {
                thumbsHtml += "<label class=\"gadd-label\">+<input type=\"file\" accept=\"image/*\" multiple data-action=\"gallery\" data-catid=\"" + catId + "\"></label>";
              }
              gallery.innerHTML = thumbsHtml;
              attachPhotoListeners();
            }
          }
        });
      });
    });
  });

  // Draw weight chart after render
  document.querySelectorAll("canvas[id^='wchart-']").forEach(canvas => {
    const catId = parseInt(canvas.id.replace("wchart-",""));
    drawWeightChart(canvas, catId);
  });
  // Draw growth charts
  document.querySelectorAll("canvas[id^='gchart-']").forEach(canvas => {
    const catId = parseInt(canvas.id.replace("gchart-",""));
    drawGrowthChart(canvas, catId);
  });
}

function drawWeightChart(canvas, catId) {
  const entries = state.weights[catId] || [];
  if (entries.length < 2) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const vals = entries.map(e=>e.value);
  const mn = Math.min(...vals)-0.3, mx = Math.max(...vals)+0.3;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = "#c0714f";
  ctx.lineWidth = 2.5;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  entries.forEach((e,i) => {
    const x = (i/(entries.length-1))*W;
    const y = H - ((e.value-mn)/(mx-mn))*H;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  entries.forEach((e,i) => {
    const x = (i/(entries.length-1))*W;
    const y = H - ((e.value-mn)/(mx-mn))*H;
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle="#c0714f";
    ctx.fill();
  });
}

// ── KALENDAR ──────────────────────────────────────────────────────────────
function renderKalendar() {
  const y = state.calYear, m = state.calMonth;
  const daysInMonth = new Date(y,m+1,0).getDate();
  const firstDow = new Date(y,m,1).getDay();
  const offset = firstDow === 0 ? 6 : firstDow - 1;
  const td = todayStr();

  function ds(d) { return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
  function evOnDay(d) { return state.events.filter(e=>e.datum===ds(d)); }

  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const upcoming = [...state.events].filter(e=>e.datum>=td).sort((a,b)=>a.datum.localeCompare(b.datum)).slice(0,10);
  const past = [...state.events].filter(e=>e.datum<td).sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,5);

  return `
    <div class="sc">
      <div class="cal-hdr">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${MONTHS[m]} ${y}</div>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">
        ${DAYS.map(d=>`<div class="cdn">${d}</div>`).join("")}
        ${cells.map(d => {
          if (d===null) return `<div class="cd empty"></div>`;
          const evs = evOnDay(d);
          const dayS = ds(d);
          return `<div class="cd${dayS===td?" today":""}">
            <div class="cdn2">${d}</div>
            ${evs.slice(0,2).map(e=>`<span class="cev">${e.naslov}</span>`).join("")}
            ${evs.length>2?`<span style="font-size:.5rem;color:var(--rust)">+${evs.length-2}</span>`:""}
          </div>`;
        }).join("")}
      </div>
      ${state.showEventForm ? `
        <div class="lf">
          <div class="fr">
            <input type="date" id="evdat" value="${today()}">
            <select id="evkat">${KATS.map(k=>`<option>${k}</option>`).join("")}</select>
          </div>
          <input type="text" id="evnaslov" placeholder="Naslov događaja">
          <select id="evcatid">
            <option value="">— Sve mačke —</option>
            ${state.cats.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join("")}
          </select>
          <textarea id="evbil" placeholder="Bilješka (neobavezno)"></textarea>
          <div style="display:flex;gap:.4rem">
            <button class="btn bp" onclick="submitEvent()">Spremi</button>
            <button class="btn bs" onclick="toggleForm('event')">Odustani</button>
          </div>
        </div>` :
        `<button class="btn bp" onclick="toggleForm('event')">+ Dodaj događaj</button>`
      }
    </div>
    ${upcoming.length>0?`
      <div class="sc">
        <div class="st"><span>📅 Nadolazeći događaji</span></div>
        ${upcoming.map(e=>{ const c=state.cats.find(c=>String(c.id)===String(e.catId)); return `
          <div class="ev-item">
            <span class="ev-date">${e.datum}</span>
            <div style="flex:1">
              <div style="font-weight:600;color:var(--bark);font-size:.83rem">${e.naslov}</div>
              ${c?`<div style="font-size:.73rem;color:var(--rust)">${c.emoji} ${c.name}</div>`:""}
              ${e.biljeska?`<div style="font-size:.76rem;margin-top:.12rem">${e.biljeska}</div>`:""}
            </div>
            <button class="bd" onclick="deleteEvent('${e.id}')">✕</button>
          </div>`; }).join("")}
      </div>`:""}
    ${past.length>0?`
      <div class="sc">
        <div class="st"><span>🕓 Prošli događaji</span></div>
        ${past.map(e=>{ const c=state.cats.find(c=>String(c.id)===String(e.catId)); return `
          <div class="ev-item" style="opacity:.7">
            <span class="ev-date">${e.datum}</span>
            <div style="flex:1">
              <div style="font-weight:600;color:var(--bark);font-size:.83rem">${e.naslov}</div>
              ${c?`<div style="font-size:.73rem;color:var(--rust)">${c.emoji} ${c.name}</div>`:""}
            </div>
            <button class="bd" onclick="deleteEvent('${e.id}')">✕</button>
          </div>`; }).join("")}
      </div>`:""}
    ${state.events.length===0&&!state.showEventForm?'<div class="sc"><div class="empty">Još nema događaja. Dodajte prvi klikom na gumb iznad.</div></div>':""}
  `;
}

  render();
}

// ── ROUND 3 HELPERS ──────────────────────────────────────────────────────
function renderGrowthSection(c) {
  const weights = state.weights[c.id] || [];
  if (weights.length < 2) return "";
  // Show growth chart for all cats with enough data points
  return `
    <div class="sc">
      <div class="st"><span>📈 Graf rasta i težine</span></div>
      <canvas id="gchart-${c.id}" width="600" height="100"></canvas>
      <div style="font-size:.72rem;color:var(--rust);text-align:center;margin-top:.3rem;font-style:italic">
        ${weights[0].datum} → ${weights[weights.length-1].datum} · ${weights.length} mjerenja
      </div>
    </div>`;
}

function drawGrowthChart(canvas, catId) {
  const entries = state.weights[catId] || [];
  if (entries.length < 2) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const vals = entries.map(e => e.value);
  const mn = Math.min(...vals) - 0.2, mx = Math.max(...vals) + 0.2;
  ctx.clearRect(0, 0, W, H);
  // Grid lines
  ctx.strokeStyle = "#e8dcc8";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "rgba(192,113,79,0.25)");
  grad.addColorStop(1, "rgba(192,113,79,0)");
  ctx.beginPath();
  entries.forEach((e, i) => {
    const x = (i / (entries.length - 1)) * W;
    const y = H - ((e.value - mn) / (mx - mn)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  // Line
  ctx.strokeStyle = "#c0714f"; ctx.lineWidth = 2.5;
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.beginPath();
  entries.forEach((e, i) => {
    const x = (i / (entries.length - 1)) * W;
    const y = H - ((e.value - mn) / (mx - mn)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  // Dots + labels
  entries.forEach((e, i) => {
    const x = (i / (entries.length - 1)) * W;
    const y = H - ((e.value - mn) / (mx - mn)) * H;
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#c0714f"; ctx.fill();
    ctx.fillStyle = "#6b4423"; ctx.font = "10px Lora,serif";
    ctx.textAlign = "center";
    ctx.fillText(e.value + "kg", x, y - 8);
  });
}

function daysUntilNextBirthday(dateStr) {
  if (!dateStr || dateStr === "Nepoznat") return null;
  // Try to parse Croatian date format or ISO
  const now = new Date();
  const thisYear = now.getFullYear();
  let month = -1, day = -1;
  // ISO format
  if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
    const d = new Date(dateStr);
    month = d.getMonth(); day = d.getDate();
  }
  // Croatian months
  const hrMonths = {"siječnja":0,"veljače":1,"ožujka":2,"travnja":3,"svibnja":4,"lipnja":5,"srpnja":6,"kolovoza":7,"rujna":8,"listopada":9,"studenog":10,"prosinca":11,
    "siječanj":0,"veljača":1,"ožujak":2,"travanj":3,"svibanj":4,"lipanj":5,"srpanj":6,"kolovoz":7,"rujan":8,"listopad":9,"studeni":10,"prosinac":11};
  const parts = dateStr.toLowerCase().split(/[\s.]+/);
  parts.forEach((p, i) => {
    if (hrMonths[p] !== undefined) { month = hrMonths[p]; day = parseInt(parts[i-1]||parts[i+1]); }
  });
  if (month === -1 || !day) return null;
  let next = new Date(thisYear, month, day);
  if (next < now) next = new Date(thisYear + 1, month, day);
  const diff = Math.round((next - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function renderBirthdayTab() {
  const cats = state.cats;
  const items = cats.map(c => {
    const bDays = daysUntilNextBirthday(c.rodjendan);
    const gDays = daysUntilNextBirthday(c.gotchaDay);
    return { c, bDays, gDays };
  }).filter(x => x.bDays !== null || x.gDays !== null);

  const sorted = [...items].sort((a, b) => {
    const aMin = Math.min(a.bDays ?? 999, a.gDays ?? 999);
    const bMin = Math.min(b.bDays ?? 999, b.gDays ?? 999);
    return aMin - bMin;
  });

  return `
    <div class="sc">
      <div class="st"><span>🎂 Rođendani i Gotcha dani</span></div>
      ${sorted.length === 0 ? '<div class="empty">Dodajte datume rođendana u profile mačaka.</div>' : ""}
      ${sorted.map(({c, bDays, gDays}) => {
        let html = "";
        if (bDays !== null) {
          const isToday = bDays === 0;
          html += `<div class="bday-card${isToday?" bday-today":""}">
            <div class="bday-emoji">${isToday?"🎉":c.emoji}</div>
            <div><div class="bday-name">${c.name}</div>
            <div class="bday-sub">🎂 Rođendan · ${c.rodjendan}</div></div>
            <div class="bday-days">${isToday?"DANAS! 🎉":bDays+"d"}</div>
          </div>`;
        }
        if (gDays !== null) {
          const isToday = gDays === 0;
          html += `<div class="bday-card${isToday?" bday-today":""}">
            <div class="bday-emoji">${isToday?"🎉":c.emoji}</div>
            <div><div class="bday-name">${c.name}</div>
            <div class="bday-sub">🏠 Gotcha Dan · ${c.gotchaDay}</div></div>
            <div class="bday-days">${isToday?"DANAS! 🎉":gDays+"d"}</div>
          </div>`;
        }
        return html;
      }).join("")}
    </div>
    <div class="sc">
      <div class="st"><span>💡 Savjet</span></div>
      <p style="font-size:.82rem;line-height:1.7;color:var(--ink)">
        Datumi se automatski izračunavaju iz podataka u profilu svake mačke.
        Ako datum nije prikazan, dodajte ga u profil mačke klikom na ✏️ pored polja Rođendan ili Gotcha Dan.
      </p>
    </div>`;
}
